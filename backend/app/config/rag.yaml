# RAG 企业级配置 (替代 chroma.yaml)

retrieval:
  coarse_k: 100          # 粗排召回数
  max_documents: 8       # 最终总结文档数（简历/工作经历类文档分散，需要更多）

reranker:
  model: "BAAI/bge-reranker-large"
  max_length: 512

ranking:
  w_relevance: 0.5
  w_time: 0.3
  w_weight: 0.2
  time_decay_lambda: 1.0

query_processing:
  max_length: 400
  max_sub_queries: 3      # 降低：避免拆出过多噪音子问题
  max_expansions: 2       # 降低：避免扩展过多噪音变体

chunking:
  default:
    chunk_size: 400
    chunk_overlap: 40
  separators: ["\n\n", "\n", "。", "！", "？", "!", "?", " ", ""]

milvus:
  host: "localhost"
  port: 19530
  collection_name: "rag_collection"
  index_type: "IVF_FLAT"
  metric_type: "COSINE"
  nlist: 128

allow_file_types: ["txt", "pdf", "md", "pptx", "docx", "xlsx", "xls", "py", "js", "ts", "java", "go"]

doc_category_weights:
  政策制度: 1.0
  技术文档: 0.9
  产品手册: 0.85
  周报日报: 0.4
  会议纪要: 0.3
  default: 0.7

hybrid_search:
  weights:
    balanced: [0.5, 0.5]
    precise: [0.65, 0.35]
    semantic: [0.3, 0.7]

ocr:
  enabled: true
  language: "ch"

# 保留 ChromaDB 时代的配置供过渡使用
md5_hex_store: data/md5_hex_store/md5_hex_store.txt
data_path: data
