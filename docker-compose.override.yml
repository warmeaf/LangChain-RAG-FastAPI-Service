# =============================================
# 开发模式覆盖 (自动加载，无需额外参数)
# 生产部署时删除此文件 或 使用 --no-override
# =============================================

services:
  # Django 热重载
  django:
    volumes:
      # 挂载源码，修改即时生效
      - ./DjangoUserService:/app
      # 但排除这些目录，避免覆盖容器内数据
      - /app/.venv
      - /app/__pycache__
    # Django runserver 自带热重载，无需额外配置
    restart: "no"

  # FastAPI 热重载
  backend:
    volumes:
      - ./backend:/app
      - /app/.venv
      - /app/__pycache__
    # 启用 uvicorn 热重载
    command: >
      python -m uvicorn main:app
      --host 0.0.0.0 --port 8000
      --reload
      --reload-dir /app
    restart: "no"
    environment:
      # 开发模式启用更多日志
      - LOG_LEVEL=DEBUG
