services:
  # =============================================
  # MySQL - 聊天记录、会话、用户数据
  # =============================================
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_history}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =============================================
  # Redis - 缓存、限流、JWT 黑名单
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =============================================
  # Milvus 元数据存储 (etcd)
  # =============================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Milvus 对象存储 (MinIO)
  # =============================================
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Milvus 向量数据库
  # =============================================
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =============================================
  # Django 用户认证微服务
  # =============================================
  django:
    build:
      context: ./DjangoUserService
      dockerfile: Dockerfile
    container_name: rag-django
    ports:
      - "8001:8001"
    env_file:
      - DjangoUserService/.env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - django_media:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =============================================
  # FastAPI 后端
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      # 覆盖为 Docker 内部服务名
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - MILVUS_HOST=milvus
      # Ollama 仍在宿主机上
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Django 用户服务
      - DJANGO_API_URL=http://django:8001
      # 清空宿主机绝对路径，走 HF 镜像下载
      - RERANKER_MODEL_PATH=
      # HuggingFace 缓存持久化
      - HF_HOME=/app/.cache/huggingface
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - hf_cache:/app/.cache/huggingface
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      django:
        condition: service_healthy
    networks:
      - rag-net
    restart: unless-stopped

# =============================================
# 持久化卷
# =============================================
volumes:
  mysql_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  hf_cache:
  django_media:

# =============================================
# 共享网络
# =============================================
networks:
  rag-net:
    driver: bridge
